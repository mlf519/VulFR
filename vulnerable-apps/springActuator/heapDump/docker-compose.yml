version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: my-blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: my_blog_db
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - my-blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: eclipse-temurin:8-jre
    container_name: my-blog-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/my_blog_db?useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "28083:28083"
    volumes:
      - ./My-Blog-master/target/my-blog-4.0.0-SNAPSHOT.jar:/app/app.jar
    working_dir: /app
    command: ["java", "-jar", "app.jar"]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - my-blog-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  my-blog-network:
    driver: bridge
