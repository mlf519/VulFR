server:
  port: 8082
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vulfr?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 519666
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        storage_engine: innodb

docker:
  host: npipe:////./pipe/docker_engine
  port-range:
    start: 10000
    end: 12000

logging:
  level:
    org.mcc.vulfr: DEBUG
    org.hibernate.SQL: DEBUG