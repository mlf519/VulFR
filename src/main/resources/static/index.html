<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulFR - 漏洞靶场管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        header h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        header h1::before {
            content: '🛡️';
            font-size: 28px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn-warning:hover {
            background: #d97706;
            transform: translateY(-2px);
        }
        
        .btn-info {
            background: #3b82f6;
            color: white;
        }
        
        .btn-info:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #64748b;
        }
        
        tr:hover {
            background: #f8fafc;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-running {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status-stopped {
            background: #fef2f2;
            color: #dc2626;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.success {
            background: #10b981;
        }
        
        .toast.error {
            background: #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        
        .filter-bar input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            flex: 1;
            max-width: 300px;
        }
        
        .cve-tag {
            background: #fef3c7;
            color: #d97706;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>VulFR - 漏洞靶场管理平台</h1>
        </header>
        
        <div class="card">
            <div class="controls">
                <button class="btn btn-primary" onclick="showAddModal()">+ 新增靶场</button>
                <button class="btn btn-secondary" onclick="loadEnvironments()">🔄 刷新</button>
            </div>
            
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="搜索靶场名称或CVE编号..." onkeyup="debounceSearch()">
                <button class="btn btn-primary" onclick="loadEnvironments()">搜索</button>
            </div>
            
            <table id="envTable">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>CVE编号</th>
                        <th>描述</th>
                        <th>访问链接</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="envTableBody">
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div>📦</div>
                            <p>暂无靶场环境</p>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div id="pagination" style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevPage()" disabled>上一页</button>
                <span id="pageInfo">第 1 / 1 页，共 0 条记录</span>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <input type="number" id="jumpPageInput" placeholder="页码" min="1" style="width: 60px; padding: 5px; border: 1px solid #ddd; border-radius: 4px;">
                    <button class="btn btn-primary" style="padding: 5px 12px; font-size: 12px;" onclick="jumpToPage()">跳转</button>
                </div>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>下一页</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2>新增靶场环境</h2>
            <form id="addForm">
                <div class="form-group">
                    <label>名称 *</label>
                    <input type="text" id="nameInput" required placeholder="如: Log4j2 CVE-2021-44228">
                </div>
                <div class="form-group">
                    <label>CVE编号</label>
                    <input type="text" id="cveInput" placeholder="如: CVE-2021-44228">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="descInput" placeholder="简要描述靶场内容"></textarea>
                </div>
                <div class="form-group">
                    <label>路径 *</label>
                    <input type="text" id="pathInput" required placeholder="靶场目录路径">
                </div>
                <div class="form-group">
                    <label>访问链接</label>
                    <div id="urlInputs">
                        <div class="url-input-group">
                            <input type="text" class="url-name" placeholder="链接名称（如：网页端）">
                            <input type="text" class="url-value" placeholder="访问地址（如：http://localhost:8080）">
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="addUrlInput()">+ 添加链接</button>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">确认添加</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>编辑靶场环境</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>名称 *</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>CVE编号</label>
                    <input type="text" id="editCve">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="editDesc"></textarea>
                </div>
                <div class="form-group">
                    <label>路径 *</label>
                    <input type="text" id="editPath" required>
                </div>
                <div class="form-group">
                    <label>访问链接</label>
                    <div id="editUrlInputs">
                        <div class="url-input-group">
                            <input type="text" class="url-name" placeholder="链接名称（如：网页端）">
                            <input type="text" class="url-value" placeholder="访问地址（如：http://localhost:8080）">
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="addEditUrlInput()">+ 添加链接</button>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const API_URL = 'http://localhost:8082/api/environments';
        let currentPage = 0;
        let totalPages = 1;
        let totalElements = 0;
        
        async function loadEnvironments(page = 0, keyword = '') {
            try {
                const url = new URL(`${API_URL}/search`);
                url.searchParams.set('page', page);
                url.searchParams.set('size', 10);
                url.searchParams.set('keyword', keyword);
                url.searchParams.set('v', '2026051201');
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                console.log('API Response:', data);
                
                currentPage = data.number !== undefined ? data.number : 0;
                totalPages = data.totalPages !== undefined ? data.totalPages : 1;
                totalElements = data.totalElements !== undefined ? data.totalElements : 0;
                
                renderTable(data.content || []);
                updatePagination();
            } catch (error) {
                console.error('Load environments error:', error);
                showToast('加载失败: ' + error.message, 'error');
            }
        }
        
        function updatePagination() {
            document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} / ${totalPages} 页，共 ${totalElements} 条记录`;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
        }
        
        function prevPage() {
            if (currentPage > 0) {
                const keyword = document.getElementById('searchInput').value;
                loadEnvironments(currentPage - 1, keyword);
            }
        }
        
        function nextPage() {
            if (currentPage < totalPages - 1) {
                const keyword = document.getElementById('searchInput').value;
                loadEnvironments(currentPage + 1, keyword);
            }
        }
        
        function jumpToPage() {
            const input = document.getElementById('jumpPageInput');
            const targetPage = parseInt(input.value);
            
            if (isNaN(targetPage) || targetPage < 1 || targetPage > totalPages) {
                showToast(`请输入有效页码 (1-${totalPages})`, 'error');
                return;
            }
            
            const keyword = document.getElementById('searchInput').value;
            loadEnvironments(targetPage - 1, keyword);
            input.value = '';
        }
        
        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const keyword = document.getElementById('searchInput').value;
                loadEnvironments(0, keyword);
            }, 300);
        }
        
        function renderTable(environments) {
            const tbody = document.getElementById('envTableBody');
            if (!environments || environments.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div>📦</div>
                            <p>暂无靶场环境</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = environments.map(env => `
                <tr>
                    <td><strong>${escapeHtml(env.name)}</strong></td>
                    <td>${env.cveId ? `<span class="cve-tag" style="white-space: nowrap;">${env.cveId}</span>` : '-'}</td>
                    <td id="desc-${env.id}"></td>
                    <td>${renderAccessUrls(env.accessUrls)}</td>
                    <td><span class="status-badge status-${env.status.toLowerCase()}">${env.status}</span></td>
                    <td>
                        <div style="display: flex; gap: 5px; flex-wrap: nowrap; align-items: center;">
                            ${env.status === 'stopped' ? `
                                <button class="btn btn-success" style="padding: 5px 10px; font-size: 12px; white-space: nowrap;" onclick="startEnvironment(${env.id})">启动</button>
                            ` : `
                                <button class="btn btn-warning" style="padding: 5px 10px; font-size: 12px; white-space: nowrap;" onclick="stopEnvironment(${env.id})">停止</button>
                            `}
                            <button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px; white-space: nowrap;" onclick="showEditModal(${env.id})">编辑</button>
                            <button class="btn btn-info" style="padding: 5px 10px; font-size: 12px; white-space: nowrap;" onclick="duplicateEnvironment(${env.id})">复制</button>
                            <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px; white-space: nowrap;" onclick="deleteEnvironment(${env.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            environments.forEach(env => {
                const descCell = document.getElementById(`desc-${env.id}`);
                if (descCell) {
                    let description = env.description || '-';
                    console.log('Original description:', JSON.stringify(description));
                    description = description.replace(/\\r\\n/g, '<br>')
                                           .replace(/\\r/g, '<br>')
                                           .replace(/\\n/g, '<br>')
                                           .replace(/\r\n/g, '<br>')
                                           .replace(/\r/g, '<br>')
                                           .replace(/\n/g, '<br>')
                                           .replace(/<br\s*\/?>/gi, '<br>');
                    console.log('Processed description:', description);
                    descCell.innerHTML = description;
                }
            });
        }
        
        function escapeHtml(str) {
            if (str === null || str === undefined) {
                return '';
            }
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderAccessUrls(accessUrlsJson) {
            if (!accessUrlsJson) {
                return '-';
            }
            try {
                const urls = JSON.parse(accessUrlsJson);
                if (!urls || urls.length === 0) {
                    return '-';
                }
                return urls.map(url => `
                    <div style="margin-bottom: 6px; clear: both;">
                        <span style="font-weight: bold; display: block; float: none; width: 100%;">${escapeHtml(url.name)}:</span>
                        <a href="${escapeHtml(url.value)}" target="_blank" style="color: #007bff; text-decoration: underline; display: block; float: none; width: 100%; word-break: break-all; margin-top: 2px;">${escapeHtml(url.value)}</a>
                    </div>
                `).join('');
            } catch (e) {
                return '-';
            }
        }

        function addUrlInput() {
            const container = document.getElementById('urlInputs');
            container.innerHTML += `
                <div class="url-input-group" style="margin-top: 8px;">
                    <input type="text" class="url-name" placeholder="链接名称">
                    <input type="text" class="url-value" placeholder="访问地址">
                    <button type="button" onclick="removeUrlInput(this)" style="padding: 4px 8px; background: #dc3545; color: white; border: none; border-radius: 4px;">删除</button>
                </div>
            `;
        }

        function removeUrlInput(btn) {
            btn.parentElement.remove();
        }

        function addEditUrlInput() {
            const container = document.getElementById('editUrlInputs');
            container.innerHTML += `
                <div class="url-input-group" style="margin-top: 8px;">
                    <input type="text" class="url-name" placeholder="链接名称">
                    <input type="text" class="url-value" placeholder="访问地址">
                    <button type="button" onclick="removeEditUrlInput(this)" style="padding: 4px 8px; background: #dc3545; color: white; border: none; border-radius: 4px;">删除</button>
                </div>
            `;
        }

        function removeEditUrlInput(btn) {
            btn.parentElement.remove();
        }
        
        function showAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('addForm').reset();
        }
        
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlGroups = document.querySelectorAll('#urlInputs .url-input-group');
            const accessUrls = [];
            urlGroups.forEach(group => {
                const name = group.querySelector('.url-name').value.trim();
                const value = group.querySelector('.url-value').value.trim();
                if (name && value) {
                    accessUrls.push({ name, value });
                }
            });
            
            const data = {
                name: document.getElementById('nameInput').value,
                cveId: document.getElementById('cveInput').value,
                description: document.getElementById('descInput').value,
                path: document.getElementById('pathInput').value,
                accessUrls: accessUrls.length > 0 ? JSON.stringify(accessUrls) : null
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('添加成功!', 'success');
                    closeModal();
                    loadEnvironments();
                } else {
                    const error = await response.json();
                    showToast('添加失败: ' + (error.message || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('添加失败: ' + error.message, 'error');
            }
        });
        
        async function showEditModal(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const env = await response.json();
                
                document.getElementById('editId').value = env.id;
                document.getElementById('editName').value = env.name;
                document.getElementById('editCve').value = env.cveId || '';
                document.getElementById('editDesc').value = env.description || '';
                document.getElementById('editPath').value = env.path || '';
                
                const urlContainer = document.getElementById('editUrlInputs');
                urlContainer.innerHTML = '';
                
                if (env.accessUrls) {
                    try {
                        const urls = JSON.parse(env.accessUrls);
                        urls.forEach((url, index) => {
                            urlContainer.innerHTML += `
                                <div class="url-input-group" style="margin-top: ${index === 0 ? '0' : '8px'};">
                                    <input type="text" class="url-name" value="${escapeHtml(url.name)}">
                                    <input type="text" class="url-value" value="${escapeHtml(url.value)}">
                                    ${urls.length > 1 ? `<button type="button" onclick="removeEditUrlInput(this)" style="padding: 4px 8px; background: #dc3545; color: white; border: none; border-radius: 4px;">删除</button>` : ''}
                                </div>
                            `;
                        });
                    } catch (e) {
                        urlContainer.innerHTML = '<div class="url-input-group"><input type="text" class="url-name" placeholder="链接名称"><input type="text" class="url-value" placeholder="访问地址"></div>';
                    }
                } else {
                    urlContainer.innerHTML = '<div class="url-input-group"><input type="text" class="url-name" placeholder="链接名称"><input type="text" class="url-value" placeholder="访问地址"></div>';
                }
                
                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                showToast('加载失败: ' + error.message, 'error');
            }
        }
        
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            const urlGroups = document.querySelectorAll('#editUrlInputs .url-input-group');
            const accessUrls = [];
            urlGroups.forEach(group => {
                const name = group.querySelector('.url-name').value.trim();
                const value = group.querySelector('.url-value').value.trim();
                if (name && value) {
                    accessUrls.push({ name, value });
                }
            });
            
            const data = {
                name: document.getElementById('editName').value,
                cveId: document.getElementById('editCve').value,
                description: document.getElementById('editDesc').value,
                path: document.getElementById('editPath').value,
                accessUrls: accessUrls.length > 0 ? JSON.stringify(accessUrls) : null
            };
            
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('修改成功!', 'success');
                    closeEditModal();
                    loadEnvironments();
                } else {
                    const error = await response.json();
                    showToast('修改失败: ' + (error.message || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('修改失败: ' + error.message, 'error');
            }
        });
        
        async function startEnvironment(id) {
            const button = document.querySelector(`button[onclick="startEnvironment(${id})"]`);
            const originalText = button.textContent;
            button.textContent = '启动中...';
            button.disabled = true;
            button.style.opacity = '0.7';
            
            try {
                const response = await fetch(`${API_URL}/${id}/start`, { method: 'POST' });
                if (response.ok) {
                    const result = await response.json();
                    
                    button.textContent = '验证中...';
                    
                    const accessUrls = result.accessUrls ? JSON.parse(result.accessUrls) : [];
                    if (accessUrls.length > 0) {
                        const firstUrl = accessUrls[0].value;
                        const isAccessible = await checkUrlAccessibility(firstUrl);
                        if (isAccessible) {
                            showToast('启动成功!', 'success');
                        } else {
                            showToast('验证失败，正在关闭环境...', 'warning');
                            
                            try {
                                await fetch(`${API_URL}/${id}/stop`, { method: 'POST' });
                                showToast('启动失败，已自动关闭环境', 'error');
                            } catch (stopError) {
                                showToast('启动失败，关闭环境时发生错误: ' + stopError.message, 'error');
                            }
                        }
                    } else {
                        showToast('启动成功!', 'success');
                    }
                    
                    loadEnvironments();
                } else {
                    let errorMessage = '未知错误';
                    try {
                        const error = await response.json();
                        errorMessage = error.message || error.detail || '未知错误';
                    } catch {
                        const text = await response.text();
                        errorMessage = text || '未知错误';
                    }
                    showToast('启动失败: ' + errorMessage, 'error');
                }
            } catch (error) {
                showToast('启动失败: ' + (error.message || '网络错误'), 'error');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
                button.style.opacity = '1';
            }
        }
        
        async function checkUrlAccessibility(url) {
            const maxAttempts = 40;
            const delayMs = 1000;
            
            for (let i = 0; i < maxAttempts; i++) {
                console.log(`Attempt ${i + 1}/40 to access: ${url}`);
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    
                    let response;
                    try {
                        response = await fetch(url, { 
                            method: 'HEAD', 
                            signal: controller.signal,
                            mode: 'no-cors'
                        });
                    } catch (headError) {
                        console.log('HEAD request failed, trying GET...');
                        response = await fetch(url, { 
                            method: 'GET', 
                            signal: controller.signal,
                            mode: 'no-cors'
                        });
                    }
                    
                    clearTimeout(timeoutId);
                    
                    if (response.type === 'opaque') {
                        console.log('Opaque response received (CORS restricted), assuming accessible');
                        return true;
                    }
                    
                    if (response.ok || response.status === 401 || response.status === 403) {
                        console.log(`Success! Status: ${response.status}`);
                        return true;
                    }
                } catch (error) {
                    console.log(`Attempt ${i + 1} to access ${url} failed:`, error.message);
                }
                await new Promise(resolve => setTimeout(resolve, delayMs));
            }
            console.log(`All ${maxAttempts} attempts failed, returning false`);
            return false;
        }
        
        async function stopEnvironment(id) {
            const button = document.querySelector(`button[onclick="stopEnvironment(${id})"]`);
            const originalText = button.textContent;
            button.textContent = '停止中...';
            button.disabled = true;
            button.style.opacity = '0.7';
            
            try {
                const response = await fetch(`${API_URL}/${id}/stop`, { method: 'POST' });
                if (response.ok) {
                    const result = await response.json();
                    showToast('停止成功!', 'success');
                    loadEnvironments();
                } else {
                    let errorMessage = '未知错误';
                    try {
                        const error = await response.json();
                        errorMessage = error.message || error.detail || '未知错误';
                    } catch {
                        const text = await response.text();
                        errorMessage = text || '未知错误';
                    }
                    showToast('停止失败: ' + errorMessage, 'error');
                }
            } catch (error) {
                showToast('停止失败: ' + (error.message || '网络错误'), 'error');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
                button.style.opacity = '1';
            }
        }
        
        async function deleteEnvironment(id) {
            if (!confirm('确定要删除这个靶场环境吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('删除成功!', 'success');
                    loadEnvironments();
                } else {
                    const error = await response.json();
                    showToast('删除失败: ' + (error.message || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }
        
        async function duplicateEnvironment(id) {
            try {
                const getResponse = await fetch(`${API_URL}/${id}`);
                if (!getResponse.ok) {
                    showToast('获取靶场信息失败', 'error');
                    return;
                }
                
                const originalEnv = await getResponse.json();
                
                const newEnv = {
                    name: originalEnv.name + ' (复制)',
                    cveId: originalEnv.cveId,
                    description: originalEnv.description,
                    path: originalEnv.path,
                    dockerImage: originalEnv.dockerImage,
                    accessUrls: originalEnv.accessUrls,
                    status: 'stopped'
                };
                
                const postResponse = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newEnv)
                });
                
                if (postResponse.ok) {
                    showToast('复制成功!', 'success');
                    loadEnvironments();
                } else {
                    const error = await postResponse.json();
                    showToast('复制失败: ' + (error.message || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('复制失败: ' + error.message, 'error');
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', () => loadEnvironments());
    </script>
</body>
</html>
